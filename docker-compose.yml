version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${container_name_app}
    command: sh -c "uv run manage.py migrate && uv run manage.py runserver 0.0.0.0:8000"
    ports:
      - "${port_app}:8000"
    restart: unless-stopped
    pull_policy: build
    env_file:
      stack.env