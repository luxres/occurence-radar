{% extends "reports/base.html" %}
{% load static %}

{% block title %}Reports Map{% endblock %}

{% block content %}

<!-- Page heading -->
<h3 class="text-center mb-3">Reports Map</h3>

<!-- Map container -->
<div id="map" style="height: 85vh; width: 100%; border-radius: 10px;"></div>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Parse Django JSON safely
    const reports = JSON.parse('{{ reports_json|escapejs }}');

    // Init map
    const map = L.map('map').setView([50, 10], 4);

    // Tile layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors',
        crossOrigin: true,
        referrerPolicy: 'origin'
    }).addTo(map);

    // Markers
    const markers = [];

    reports.forEach(r => {
        const marker = L.marker([r.lat, r.lng])
            .addTo(map)
            .bindPopup(`<b>${r.type}</b><br>${r.time}`);

        markers.push(marker);
    });

    // Auto zoom
    if (markers.length > 0) {
        const group = L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.2));
    }
</script>

{% endblock %}
