{% extends "reports/base.html" %}
{% load static %}

{% block title %}Share Location{% endblock %}

{% block content %}

<div class="container py-5">
    <div class="card shadow-sm p-4 mx-auto" style="max-width: 400px;">
        <h3 class="mb-4 text-center">Share Your Location</h3>

        <form id="reportForm">
            {% csrf_token %}

            <div class="mb-3">
                <label for="event_type" class="form-label">Event Type</label>
                <select id="event_type" class="form-select" required>
                    <option value="paper_check">Paper Check</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <button type="button" id="shareBtn" class="btn btn-primary w-100">
                Share Location
            </button>
        </form>

        <div id="response" class="mt-3 text-center"></div>
    </div>
</div>

<script>
    const btn = document.getElementById('shareBtn');
    const responseDiv = document.getElementById('response');

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            document.cookie.split(';').forEach(c => {
                const cookie = c.trim();
                if (cookie.startsWith(name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                }
            });
        }
        return cookieValue;
    }

    const csrftoken = getCookie('csrftoken');

    btn.addEventListener('click', () => {
        if (!navigator.geolocation) {
            responseDiv.textContent = "Geolocation not supported by your browser.";
            return;
        }

        btn.disabled = true;
        btn.textContent = "Sharing...";

        navigator.geolocation.getCurrentPosition(async (position) => {
            const latitude = Number(position.coords.latitude).toFixed(6);
            const longitude = Number(position.coords.longitude).toFixed(6);
            const event_type = document.getElementById('event_type').value;

            try {
                const res = await fetch("{% url 'report_occurrence_api' %}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-CSRFToken': csrftoken
                    },
                    body: new URLSearchParams({
                        latitude: latitude,
                        longitude: longitude,
                        event_type: event_type
                    })
                });

                const data = await res.json();

                if (data.success) {
                    responseDiv.textContent = "Location shared successfully!";
                } else {
                    let errorMsg = "";

                    if (data.errors) {
                        for (const field in data.errors) {
                            errorMsg += `${field}: ${data.errors[field].join(", ")}\n`;
                        }
                    } else {
                        errorMsg = data.error;
                    }

                    responseDiv.textContent = errorMsg;
                    btn.disabled = false;
                    btn.textContent = "Share Location";
                }

            } catch (err) {
                responseDiv.textContent = "Network or server error.";
                btn.disabled = false;
                btn.textContent = "Share Location";
            }

        }, () => {
            responseDiv.textContent = "Could not get your location. Allow location access.";
            btn.disabled = false;
            btn.textContent = "Share Location";
        });
    });
</script>

{% endblock %}
