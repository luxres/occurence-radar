{% load static %}

<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Occurrence Radar{% endblock %}</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        overflow-x: hidden;
        background: #f8f9fa;
    }

    /* =========================
       Desktop Sidebar
    ========================== */

    .sidebar {
        height: 100vh;
        width: 220px;
        position: fixed;
        top: 0;
        left: 0;
        background: #1f2937;
        padding-top: 20px;
        z-index: 1000;
    }

    .sidebar a {
        padding: 12px 20px;
        display: block;
        color: #fff;
        text-decoration: none;
        transition: background 0.2s;
    }

    .sidebar a:hover {
        background: #374151;
    }

    /* =========================
       Main Content
    ========================== */

    .content {
        margin-left: 220px;
        padding: 20px;
        min-height: 100vh;
    }

    /* =========================
       Top Bar
    ========================== */

    .topbar {
        background: #111827;
        color: white;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-radius: 10px;
    }

    .topbar-left {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .logo {
        width: 32px;
        height: 32px;
    }

    .github-btn {
        background: #24292f;
        color: white;
        padding: 8px 14px;
        border-radius: 6px;
        text-decoration: none;
        border: 1px solid #3b3b3b;
        transition: background 0.2s;
        white-space: nowrap;
    }

    .github-btn:hover {
        background: #2f363d;
        color: white;
    }

    footer {
        text-align: center;
    }

    /* =========================
       Mobile Layout
    ========================== */

    @media (max-width: 768px) {

        .sidebar {
            position: fixed;
            bottom: 0;
            top: auto;
            left: 0;
            width: 100%;
            height: 60px;

            display: flex;
            align-items: center;
            justify-content: space-around;

            padding: 0;
            background: #1f2937;
        }

        .sidebar a {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-size: 14px;
        }

        .content {
            margin-left: 0;
            padding: 15px;
            padding-bottom: 80px; /* room for bottom nav */
        }

        .topbar {
            flex-direction: column;
            gap: 12px;
            text-align: center;
        }

        .topbar-left {
            justify-content: center;
        }

        .github-btn {
            width: 100%;
            text-align: center;
        }
    }

    /* Better touch targets */

    .sidebar a,
    .github-btn {
        min-height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
</style>

</head>

<body>

<!-- Navigation -->

<nav class="sidebar">
    <a href="{% url 'occurrence_display' %}">🗺 Map</a>
    <a href="{% url 'occurrence_report' %}">📝 Report</a>
    <a href="{% url 'about' %}">ℹ️ About</a>
</nav>

<!-- Main Content -->

<div class="content">

<!-- Header -->
<div class="topbar mb-4">

    <div class="topbar-left">
        <img
            src="{% static 'images/placeholder_logo.png' %}"
            class="logo"
            alt="Logo"
        >
        <h5 class="m-0">Occurrence Radar</h5>
    </div>

    <a
        class="github-btn"
        href="https://github.com/luxres/occurence-radar"
        target="_blank"
        rel="noopener noreferrer"
    >
        ⭐ Fork me on GitHub
    </a>

</div>

<!-- Page Content -->
{% block content %}
{% endblock %}

<!-- Footer -->
<footer class="mt-4 py-3 border-top text-muted">
    <small>
        <a
            href="{% url 'imprint' %}"
            class="text-muted text-decoration-none me-3"
        >
            Impressum
        </a>

        <a
            href="{% url 'privacy' %}"
            class="text-muted text-decoration-none"
        >
            Privacy Policy
        </a>
    </small>
</footer>

</div>

</body>
</html>
