{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Occurence Radar{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            width: 220px;
            position: fixed;
            top: 0;
            left: 0;
            background: #1f2937;
            padding-top: 20px;
        }

        .sidebar a {
            padding: 12px 20px;
            display: block;
            color: #fff;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #374151;
        }

        /* Main content */
        .content {
            margin-left: 220px;
            padding: 20px;
        }

        /* Header */
        .topbar {
            background: #111827;
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 32px;
            height: 32px;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <a href="{% url 'occurrence_display' %}">🗺 Map</a>
    <a href="{% url 'occurrence_report' %}">📝 Report</a>
</div>

<!-- Main content -->
<div class="content">

    <!-- Top header -->
    <div class="topbar mb-4">
        <img src="{% static 'images/placeholder_logo.png' %}" class="logo" alt="Logo">
        <h5 class="m-0">Occurence Radar</h5>
    </div>

    <!-- Page content -->
    {% block content %}
    {% endblock %}

</div>

</body>
</html>
