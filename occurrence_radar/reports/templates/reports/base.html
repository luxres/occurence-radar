{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Occurence Radar{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            width: 220px;
            position: fixed;
            top: 0;
            left: 0;
            background: #1f2937;
            padding-top: 20px;
        }

        .sidebar a {
            padding: 12px 20px;
            display: block;
            color: #fff;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #374151;
        }

        /* Main content */
        .content {
            margin-left: 220px;
            padding: 20px;
        }

        /* Header */
        .topbar {
            background: #111827;
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 32px;
            height: 32px;
        }

        /* GitHub button */
        .github-btn {
            background: #24292f;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            border: 1px solid #3b3b3b;
            transition: 0.2s;
        }

        .github-btn:hover {
            background: #2f363d;
            color: white;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <a href="{% url 'occurrence_display' %}">🗺 Map</a>
    <a href="{% url 'occurrence_report' %}">📝 Report</a>
    <a href="{% url 'about' %}">ℹ️ About</a>
</div>

<!-- Main content -->
<div class="content">

    <!-- Top header -->
    <div class="topbar mb-4">

        <div class="topbar-left">
            <img src="{% static 'images/placeholder_logo.png' %}" class="logo" alt="Logo">
            <h5 class="m-0">Occurence Radar</h5>
        </div>

        <a class="github-btn"
           href="https://github.com/luxres/occurence-radar"
           target="_blank">
            ⭐ Fork me on GitHub
        </a>

    </div>

    <!-- Page content -->
    {% block content %}
    {% endblock %}

    <!-- Footer -->
    <footer class="mt-4 py-3 border-top text-muted">
        <div class="d-flex justify-content-center">

            <small>
                <a href="{% url 'imprint' %}" class="text-muted text-decoration-none me-3">
                    Impressum
                </a>

                <a href="{% url 'privacy' %}" class="text-muted text-decoration-none">
                    Privacy Policy
                </a>
            </small>

        </div>
    </footer>

</div>

</body>
</html>
